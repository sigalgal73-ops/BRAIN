<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="facebook-domain-verification" content="gzjgv9eghct29v046qzstfzum02ncz" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos | Brain Co-Manager</title>
<meta name="description" content="All Brain Co-Manager videos in one place — click a tile and watch, without leaving the site.">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
.vid-wrap{max-width:1080px;margin:0 auto;padding:0 8px 50px;direction:ltr}
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
.vid-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;text-align:left}
.vid-card:hover{transform:translateY(-4px);border-color:rgba(45,156,255,.4);box-shadow:0 18px 40px -24px rgba(0,0,0,.85)}
.vid-thumb{position:relative;aspect-ratio:9/16;background:#06121f;overflow:hidden}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s}
.vid-card:hover .vid-thumb img{transform:scale(1.05)}
.vid-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,13,26,.25);transition:.25s}
.vid-card:hover .vid-play{background:rgba(2,13,26,.08)}
.vid-play span{width:48px;height:48px;border-radius:50%;background:rgba(0,212,170,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(0,212,170,.45)}
.vid-play span::before{content:'';border-style:solid;border-width:9px 0 9px 15px;border-color:transparent transparent transparent #04121e;margin-left:3px}
.vid-meta{padding:14px 16px 16px}
.vid-title{font-size:14px;font-weight:700;color:var(--white);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vid-date{font-size:11px;color:var(--muted);margin-top:6px}
.vid-loading,.vid-empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 0;font-size:14px}
.vid-more{text-align:center;margin-top:34px}
.vid-more a{display:inline-flex;align-items:center;gap:9px;padding:13px 28px;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--bright));color:#fff;font-weight:700;font-size:14px;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 10px 30px -12px rgba(45,156,255,.6)}
.vid-more a:hover{transform:translateY(-2px);box-shadow:0 16px 40px -12px rgba(45,156,255,.7)}
.impl-banner{display:block;max-width:760px;margin:40px auto 0;text-align:center;padding:18px 24px;border:1px solid rgba(0,212,170,.3);background:linear-gradient(135deg,rgba(45,156,255,.08),rgba(0,212,170,.08));border-radius:16px;color:var(--white);font-weight:700;font-size:15px;text-decoration:none;transition:border-color .2s,transform .2s}
.impl-banner:hover{border-color:var(--teal);transform:translateY(-2px)}
.vid-modal{position:fixed;inset:0;z-index:9999;background:rgba(2,8,16,.86);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
.vid-modal.open{display:flex}
.vid-modal-inner{position:relative;height:min(86vh,760px);max-width:100%;aspect-ratio:9/16;background:#000;border-radius:14px;overflow:hidden;box-shadow:0 30px 90px -20px rgba(0,0,0,.9)}
.vid-modal-inner iframe{width:100%;height:100%;border:0}
.vid-close{position:absolute;top:-46px;right:0;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.vid-close:hover{background:rgba(255,255,255,.22)}
@media(max-width:600px){.vid-grid{grid-template-columns:1fr 1fr}.vid-close{top:auto;bottom:-48px;right:50%;transform:translateX(50%)}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="nav-placeholder"></div>
<div class="page">

  <div class="page-hero">
    <div class="page-tag">VIDEOS</div>
    <h1 class="page-title">See <em>Brain</em> in action</h1>
    <p class="page-sub">All our videos in one place — click a tile and watch, right here.</p>
  </div>

  <div class="vid-wrap">
    <div class="vid-grid" id="vidGrid">
      <div class="vid-loading">Loading videos…</div>
    </div>
    <div class="vid-more"><a href="https://www.youtube.com/@Brain.co.manager" target="_blank" rel="noopener">▶ See all videos on YouTube</a></div>
    <a class="impl-banner" href="implementation.html">Onboarding is fast and easy — Plug &amp; Play, no ERP. See how it works →</a>
  </div>

  <div style="height:50px"></div>
  <footer id="footer-placeholder"></footer>
</div>

<!-- VIDEO MODAL -->
<div class="vid-modal" id="vidModal">
  <div class="vid-modal-inner">
    <button class="vid-close" id="vidClose" aria-label="Close">✕</button>
    <iframe id="vidFrame" src="" title="YouTube video" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script src="../shared.js"></script>
<script>renderNav('videos','en');renderFooter();</script>
<script>
(function(){
  var UPLOADS_PLAYLIST='UUWF03qbriOtNCx8M19QFGQQ'; // UC -> UU
  var CHANNEL_URL='https://www.youtube.com/@Brain.co.manager/videos';
  var grid=document.getElementById('vidGrid');
  var modal=document.getElementById('vidModal');
  var frame=document.getElementById('vidFrame');

  function escapeHtml(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmtDate(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'long'});}catch(e){return'';}}
  function openVid(id){frame.src='https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0';modal.classList.add('open');document.body.style.overflow='hidden';}
  function closeVid(){modal.classList.remove('open');frame.src='';document.body.style.overflow='';}
  modal.addEventListener('click',function(e){if(e.target===modal)closeVid();});
  document.getElementById('vidClose').addEventListener('click',closeVid);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeVid();});

  var RSS='https://www.youtube.com/feeds/videos.xml?channel_id=UCWF03qbriOtNCx8M19QFGQQ';
  var PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?url='];
  function withTimeout(p,ms){return new Promise(function(res,rej){var t=setTimeout(function(){rej(new Error('timeout'));},ms||9000);p.then(function(v){clearTimeout(t);res(v);},function(e){clearTimeout(t);rej(e);});});}

  function render(vids){
    if(!vids||!vids.length){linkFallback();return;}
    grid.innerHTML='';
    vids.forEach(function(v){
      var card=document.createElement('div');
      card.className='vid-card';
      card.innerHTML='<div class="vid-thumb"><img loading="lazy" src="https://i.ytimg.com/vi/'+v.id+'/oardefault.jpg" onerror="this.onerror=null;this.src=\'https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg\'" onload="if(this.naturalWidth<201&&!this._f){this._f=1;this.src=\'https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg\';}" alt=""><div class="vid-play"><span></span></div></div>'
        +'<div class="vid-meta"><div class="vid-title">'+escapeHtml(v.title)+'</div></div>';
      card.addEventListener('click',function(){openVid(v.id);});
      grid.appendChild(card);
    });
  }
  function linkFallback(){
    grid.innerHTML='<div class="vid-empty">Couldn\u2019t load the videos right now. <a href="'+CHANNEL_URL+'" target="_blank" rel="noopener" style="color:var(--teal)">Watch our YouTube channel \u2197</a></div>';
  }
  function parseRss(xml){
    var doc=new DOMParser().parseFromString(xml,'text/xml');
    var entries=doc.getElementsByTagName('entry');var out=[];
    for(var i=0;i<entries.length;i++){
      var e=entries[i];
      var idEl=e.getElementsByTagName('yt:videoId')[0]||e.getElementsByTagName('videoId')[0];
      if(!idEl)continue;var id=(idEl.textContent||'').trim();if(!id)continue;
      var tEl=e.getElementsByTagName('media:title')[0]||e.getElementsByTagName('title')[0];
      var pEl=e.getElementsByTagName('published')[0];
      out.push({id:id,title:tEl?(tEl.textContent||'').trim():'',published:pEl?(pEl.textContent||'').trim():'',thumb:'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg'});
    }
    return out;
  }
  function fromFunction(){return withTimeout(fetch('/.netlify/functions/videos'),9000).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){return (d&&d.videos)||[];});}
  function fromProxy(i){i=i||0;if(i>=PROXIES.length)return Promise.reject(0);return withTimeout(fetch(PROXIES[i]+encodeURIComponent(RSS)),9000).then(function(r){if(!r.ok)throw 0;return r.text();}).then(parseRss).then(function(v){if(v&&v.length)return v;throw 0;}).catch(function(){return fromProxy(i+1);});}

  function fromRss2Json(){
    var url='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(RSS);
    return withTimeout(fetch(url),9000).then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){
      if(!d||d.status!=='ok'||!d.items)throw 0;
      var out=[];
      d.items.forEach(function(it){
        var m=(it.link||'').match(/[?&]v=([^&]+)/)||(it.guid||'').match(/video:([\w-]+)/);
        if(!m)return;var id=m[1];
        out.push({id:id,title:it.title||'',published:it.pubDate||'',thumb:'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg'});
      });
      if(!out.length)throw 0;return out;
    });
  }
  function tryInOrder(fns,i){i=i||0;if(i>=fns.length)return Promise.reject(0);return fns[i]().then(function(v){if(v&&v.length)return v;throw 0;}).catch(function(){return tryInOrder(fns,i+1);});}
  tryInOrder([fromFunction,fromRss2Json,function(){return fromProxy(0);}]).then(render).catch(function(){linkFallback();});
})();
</script>
</body>
</html>
