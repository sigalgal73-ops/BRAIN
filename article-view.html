.article-body h3{font-size:20px;font-weight:700;color:var(--sky);margin:32px 0 12px;}

<body>
<canvas id="bg"></canvas>

  </footer>
</div>
<script src="shared.js"></script>
<script>renderNav('articles');</script>
<script>
function parseFrontmatter(text) {
  const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)/);
  if (!match) return { body: text, meta: {} };
  const meta = {};
  match[1].split('\n').forEach(line => {
    const [key, ...val] = line.split(':');
    if (key && val.length) meta[key.trim()] = val.join(':').trim().replace(/^["']|["']$/g, '');
  });
  return { meta, body: match[2] };
}

async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const url = params.get('repo');
  if (!url) { window.location = 'articles.html'; return; }

  try {
    const res = await fetch(decodeURIComponent(url));
    const text = await res.text();
    const { meta, body } = parseFrontmatter(text);

    document.title = (meta.title || 'מאמר') + ' | Brain Co-Manager';
    document.getElementById('articleTitle').textContent = meta.title || 'מאמר';
    document.getElementById('articleDesc').textContent = meta.description || '';

    const bodyEl = document.getElementById('articleBody');
    bodyEl.innerHTML =
      `<div class="art-meta">${meta.date || ''} · ${meta.author || 'צוות Brain'}</div>` +
      marked.parse(body);
  } catch(e) {
    document.getElementById('articleBody').innerHTML = '<p>שגיאה בטעינת המאמר</p>';
  }
}

loadArticle();
</script>
</body>
</html>
