<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="facebook-domain-verification" content="gzjgv9eghct29v046qzstfzum02ncz" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הזמנה | Brain Co-Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.order-form{max-width:720px;margin:0 auto;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:13px;font-weight:700;color:var(--sky);letter-spacing:.04em;}
.form-label span{color:#ff6b6b;}
.form-input{
  padding:13px 16px;background:rgba(45,156,255,0.06);
  border:1px solid var(--border);border-radius:12px;
  color:var(--white);font-size:14px;font-family:Heebo,sans-serif;
  outline:none;transition:border-color .2s;width:100%;
}
.form-input:focus{border-color:rgba(45,156,255,0.5);}
.radio-group{display:flex;flex-direction:column;gap:10px;}
.radio-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:rgba(45,156,255,0.04);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;transition:all .2s;
}
.radio-item:hover{border-color:rgba(45,156,255,0.3);background:rgba(45,156,255,0.08);}
.radio-item input[type="radio"]{accent-color:var(--bright);width:16px;height:16px;flex-shrink:0;}
.radio-item label{font-size:13px;color:var(--muted);cursor:pointer;line-height:1.5;}
.radio-item input:checked + label{color:var(--white);font-weight:600;}
.radio-item:has(input:checked){border-color:rgba(45,156,255,0.4);background:rgba(45,156,255,0.1);}
.btn-submit{
  width:100%;padding:15px;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--bright));
  color:#fff;border:none;border-radius:14px;cursor:pointer;
  font-family:Heebo,sans-serif;transition:all .2s;margin-top:8px;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(45,156,255,0.4);}
.form-note{font-size:12px;color:var(--muted);line-height:1.7;margin-top:16px;}
.form-note li{margin-bottom:4px;}
.success-msg{
  display:none;padding:20px;background:rgba(0,212,170,0.1);
  border:1px solid rgba(0,212,170,0.3);border-radius:12px;
  text-align:center;color:var(--teal);font-weight:700;font-size:15px;
  margin-top:20px;
}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="nav-placeholder"></div>

<!-- Netlify form detection -->
<form name="brain-order" netlify netlify-honeypot="bot-field" hidden>
  <input name="company"><input name="tax-id"><input name="address">
  <input name="contact"><input name="role"><input name="phone"><input name="email">
  <input name="package"><input name="billing"><input name="quantity">
</form>

<div class="page">
  <div class="page-hero">
    <div class="page-tag">ORDER</div>
    <h1 class="page-title">הזמנה – <em>Brain Co-Manager</em></h1>
    <p class="page-sub">תומך ניהולי קו-מנג'ר — מלאו את הטופס ונחזור אליכם לאישור</p>
  </div>

  <div class="sec reveal">
    <div class="order-form">
      <div class="card" style="padding:40px">

        <form id="orderForm">
          <!-- שורה 1: שם חברה / ח.פ / כתובת -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">שם חברה <span>*</span></label>
              <input type="text" class="form-input" name="company" placeholder="שם החברה" required>
            </div>
            <div class="form-group">
              <label class="form-label">ח.פ. <span>*</span></label>
              <input type="text" class="form-input" name="tax-id" placeholder="מספר ח.פ." required>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">כתובת <span>*</span></label>
            <input type="text" class="form-input" name="address" placeholder="כתובת החברה" required>
          </div>

          <!-- שורה 2: איש קשר / תפקיד -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">שם איש קשר <span>*</span></label>
              <input type="text" class="form-input" name="contact" placeholder="שם מלא" required>
            </div>
            <div class="form-group">
              <label class="form-label">תפקיד <span>*</span></label>
              <input type="text" class="form-input" name="role" placeholder="תפקיד" required>
            </div>
          </div>

          <!-- שורה 3: טלפון / אימייל -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">טלפון <span>*</span></label>
              <input type="tel" class="form-input" name="phone" placeholder="מספר טלפון" required>
            </div>
            <div class="form-group">
              <label class="form-label">אימייל <span>*</span></label>
              <input type="email" class="form-input" name="email" placeholder="כתובת אימייל" required>
            </div>
          </div>

          <!-- Toggle שנתי/חודשי -->
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;justify-content:flex-end">
            <span style="font-size:11px;color:var(--teal);border:1px solid rgba(0,212,170,.35);padding:2px 8px;border-radius:100px">חסכו עד 20%</span>
            <span style="font-size:13px;color:var(--muted)" id="o-lbl-m">חיוב חודשי</span>
            <div style="position:relative;width:46px;height:24px;background:var(--teal);border-radius:100px;cursor:pointer;flex-shrink:0" id="o-tog" onclick="toggleOrder()">
              <span style="position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s;display:block" id="o-knob"></span>
            </div>
            <span style="font-size:13px;font-weight:700;color:var(--white)" id="o-lbl-a">חיוב שנתי</span>
          </div>

          <!-- בחירת חבילה -->
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-label">בחירת חבילה (לא כולל מע"מ) <span>*</span></label>
            <input type="hidden" name="billing" id="billing-type" value="שנתי">
            <div class="radio-group" style="margin-top:8px">
              <div class="radio-item">
                <input type="radio" name="package" id="pkg1" value="Starter" required>
                <label for="pkg1"><strong style="color:var(--white)">Starter</strong> — עד 5 משתמשים &nbsp;<span id="pkg1-price" style="color:var(--teal);font-weight:700">390 ₪ למשתמש/חודש</span></label>
              </div>
              <div class="radio-item">
                <input type="radio" name="package" id="pkg2" value="Business">
                <label for="pkg2">
                  <strong style="color:var(--white)">Business</strong> — עד 20 משתמשים/סניפים &nbsp;
                  <span id="pkg2-price" style="color:var(--teal);font-weight:700">9,000 ₪/חודש</span>
                  <span id="pkg2-unit" style="color:var(--muted);font-size:12px"> | 450 ₪ למשתמש/סניף</span>
                </label>
              </div>
              <div class="radio-item">
                <input type="radio" name="package" id="pkg3" value="Pro">
                <label for="pkg3">
                  <strong style="color:var(--white)">Pro</strong> — עד 50 משתמשים/סניפים &nbsp;
                  <span id="pkg3-price" style="color:var(--teal);font-weight:700">20,000 ₪/חודש</span>
                  <span id="pkg3-unit" style="color:var(--muted);font-size:12px"> | 400 ₪ למשתמש/סניף</span>
                </label>
              </div>
              <div class="radio-item">
                <input type="radio" name="package" id="pkg4" value="Elite">
                <label for="pkg4">
                  <strong style="color:var(--white)">Elite</strong> — עד 100 משתמשים/סניפים &nbsp;
                  <span id="pkg4-price" style="color:var(--teal);font-weight:700">36,000 ₪/חודש</span>
                  <span id="pkg4-unit" style="color:var(--muted);font-size:12px"> | 360 ₪ למשתמש/סניף</span>
                </label>
              </div>
              <div class="radio-item">
                <input type="radio" name="package" id="pkg5" value="Enterprise">
                <label for="pkg5">
                  <strong style="color:var(--white)">Enterprise</strong> — מעל 100 משתמשים/סניפים &nbsp;
                  <span style="color:var(--muted);font-size:12px">| הצעת מחיר מותאמת אישית</span>
                </label>
              </div>
            </div>
          </div>

          <!-- כמות משתמשים/סניפים -->
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-label">כמות משתמשים / סניפים <span>*</span></label>
            <input type="number" class="form-input" name="quantity" placeholder="מספר משתמשים או סניפים" min="1" required>
          </div>

          <button type="submit" class="btn-submit">שליחה ←</button>
        </form>

        <div class="success-msg" id="successMsg">
          ✓ הטופס נשלח בהצלחה! ניצור איתכם קשר בהקדם לאישור ההזמנה.
        </div>


      </div>
    </div>
  </div>

  <div style="height:60px"></div>
  <div id="footer-placeholder"></div>
</div>

<script src="shared.js"></script>
<script>renderNav('order');</script>
<script>
  var orderMode = 'annual';
  var op = {
    pkg1:{ a:'390 ₪ למשתמש/חודש', m:'490 ₪ למשתמש/חודש', au:'', mu:'' },
    pkg2:{ a:'9,000 ₪/חודש', m:'11,250 ₪/חודש', au:' | 450 ₪ למשתמש/סניף', mu:' | 563 ₪ למשתמש/סניף' },
    pkg3:{ a:'20,000 ₪/חודש', m:'25,000 ₪/חודש', au:' | 400 ₪ למשתמש/סניף', mu:' | 500 ₪ למשתמש/סניף' },
    pkg4:{ a:'36,000 ₪/חודש', m:'45,000 ₪/חודש', au:' | 360 ₪ למשתמש/סניף', mu:' | 450 ₪ למשתמש/סניף' }
  };
  function toggleOrder() {
    orderMode = orderMode==='annual' ? 'monthly' : 'annual';
    var a = orderMode==='annual';
    document.getElementById('o-tog').style.background = a ? 'var(--teal)' : '#1e3550';
    document.getElementById('o-knob').style.transform = a ? '' : 'translateX(22px)';
    document.getElementById('o-lbl-a').style.cssText = a ? 'font-size:13px;font-weight:700;color:var(--white)' : 'font-size:13px;color:var(--muted)';
    document.getElementById('o-lbl-m').style.cssText = !a ? 'font-size:13px;font-weight:700;color:var(--white)' : 'font-size:13px;color:var(--muted)';
    document.getElementById('billing-type').value = a ? 'שנתי' : 'חודשי';
    ['pkg1','pkg2','pkg3','pkg4'].forEach(function(k){
      var pe = document.getElementById(k+'-price');
      if(pe) pe.textContent = a ? op[k].a : op[k].m;
      var ue = document.getElementById(k+'-unit');
      if(ue) ue.textContent = a ? op[k].au : op[k].mu;
    });
  }
  document.getElementById('orderForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const pkg = document.querySelector('input[name="package"]:checked');
    if (!pkg) { alert('נא לבחור חבילה'); return; }
    const formData = new FormData(this);
    formData.append('form-name', 'brain-order');
    fetch('/', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams(formData).toString()
    }).catch(() => {});
    this.style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
<script>renderFooter();</script>
</body>
</html>
