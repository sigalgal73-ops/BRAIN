<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="facebook-domain-verification" content="gzjgv9eghct29v046qzstfzum02ncz" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סרטונים | Brain Co-Manager</title>
<meta name="description" content="כל הסרטונים של Brain Co-Manager במקום אחד — לוחצים על קובייה וצופים, בלי לצאת מהאתר.">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.vid-wrap{max-width:1080px;margin:0 auto;padding:0 8px 50px}
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.vid-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;text-align:start}
.vid-card:hover{transform:translateY(-4px);border-color:rgba(45,156,255,.4);box-shadow:0 18px 40px -24px rgba(0,0,0,.85)}
.vid-thumb{position:relative;aspect-ratio:16/9;background:#06121f;overflow:hidden}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s}
.vid-card:hover .vid-thumb img{transform:scale(1.05)}
.vid-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,13,26,.25);transition:.25s}
.vid-card:hover .vid-play{background:rgba(2,13,26,.08)}
.vid-play span{width:56px;height:56px;border-radius:50%;background:rgba(0,212,170,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(0,212,170,.45)}
.vid-play span::before{content:'';border-style:solid;border-width:9px 0 9px 15px;border-color:transparent transparent transparent #04121e;margin-inline-start:3px}
.vid-meta{padding:14px 16px 16px}
.vid-title{font-size:14px;font-weight:700;color:var(--white);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vid-date{font-size:11px;color:var(--muted);margin-top:6px}
.vid-loading,.vid-empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 0;font-size:14px}
.vid-modal{position:fixed;inset:0;z-index:9999;background:rgba(2,8,16,.86);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
.vid-modal.open{display:flex}
.vid-modal-inner{position:relative;width:min(960px,100%);aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;box-shadow:0 30px 90px -20px rgba(0,0,0,.9)}
.vid-modal-inner iframe{width:100%;height:100%;border:0}
.vid-close{position:absolute;top:-46px;inset-inline-end:0;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:20px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.vid-close:hover{background:rgba(255,255,255,.22)}
@media(max-width:600px){.vid-grid{grid-template-columns:1fr}.vid-close{top:auto;bottom:-48px;inset-inline-end:50%;transform:translateX(50%)}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="nav-placeholder"></div>
<div class="page">

  <div class="page-hero">
    <div class="page-tag">סרטונים</div>
    <h1 class="page-title">צפו ב-<em>Brain</em> בפעולה</h1>
    <p class="page-sub">כל הסרטונים שלנו במקום אחד — לוחצים על קובייה וצופים, בלי לצאת מהאתר</p>
  </div>

  <div class="vid-wrap">
    <div class="vid-grid" id="vidGrid">
      <div class="vid-loading">טוען סרטונים…</div>
    </div>
  </div>

  <div style="height:50px"></div>
  <div id="footer-placeholder"></div>
</div>

<!-- VIDEO MODAL -->
<div class="vid-modal" id="vidModal">
  <div class="vid-modal-inner">
    <button class="vid-close" id="vidClose" aria-label="סגירה">✕</button>
    <iframe id="vidFrame" src="" title="YouTube video" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
  </div>
</div>

<script src="shared.js"></script>
<script>renderNav('videos');renderFooter();</script>
<script>
(function(){
  var LANG='he';
  var UPLOADS_PLAYLIST='UUWF03qbriOtNCx8M19QFGQQ'; // UC -> UU
  var CHANNEL_URL='https://www.youtube.com/@Brain.co.manager/videos';
  var grid=document.getElementById('vidGrid');
  var modal=document.getElementById('vidModal');
  var frame=document.getElementById('vidFrame');

  function escapeHtml(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmtDate(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('he-IL',{year:'numeric',month:'long'});}catch(e){return'';}}
  function openVid(id){frame.src='https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0';modal.classList.add('open');document.body.style.overflow='hidden';}
  function closeVid(){modal.classList.remove('open');frame.src='';document.body.style.overflow='';}
  modal.addEventListener('click',function(e){if(e.target===modal)closeVid();});
  document.getElementById('vidClose').addEventListener('click',closeVid);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeVid();});

  function fallback(){
    grid.innerHTML='<div class="vid-empty">לצפייה בכל הסרטונים: <a href="'+CHANNEL_URL+'" target="_blank" rel="noopener" style="color:var(--teal)">ערוץ היוטיוב שלנו ↗</a></div>'
      +'<div style="grid-column:1/-1;max-width:900px;margin:8px auto 0;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;border:1px solid var(--border)"><iframe width="100%" height="100%" style="border:0" src="https://www.youtube.com/embed/videoseries?list='+UPLOADS_PLAYLIST+'" title="Brain Co-Manager" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>';
  }

  fetch('/.netlify/functions/videos')
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(data){
      var vids=(data&&data.videos)||[];
      if(!vids.length){fallback();return;}
      grid.innerHTML='';
      vids.forEach(function(v){
        var card=document.createElement('div');
        card.className='vid-card';
        card.innerHTML='<div class="vid-thumb"><img loading="lazy" src="'+v.thumb+'" alt=""><div class="vid-play"><span></span></div></div>'
          +'<div class="vid-meta"><div class="vid-title">'+escapeHtml(v.title)+'</div><div class="vid-date">'+fmtDate(v.published)+'</div></div>';
        card.addEventListener('click',function(){openVid(v.id);});
        grid.appendChild(card);
      });
    })
    .catch(function(){fallback();});
})();
</script>
</body>
</html>
