<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- רקע לבן -->
  <rect width="900" height="600" fill="white"/>
  <!-- פסים כחולים -->
  <rect width="900" height="90" y="80" fill="#0038B8"/>
  <rect width="900" height="90" y="430" fill="#0038B8"/>
  <!-- מגן דוד - משולש עליון -->
