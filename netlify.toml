[build]
  publish = "."

# ============================================================
# Security Headers — brain2spark.ai
# מוסיף כותרות אבטחה חסרות, משפר ציון מ-D ל-A
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    # מניעת clickjacking — הטמעת האתר ב-iframe זדוני
    X-Frame-Options = "SAMEORIGIN"

    # מניעת MIME sniffing
    X-Content-Type-Options = "nosniff"

    # שליטה על מידע referrer שנשלח לאתרים חיצוניים
    Referrer-Policy = "strict-origin-when-cross-origin"

    # הגבלת גישה ליכולות דפדפן רגישות (מצלמה, מיקרופון, GPS)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy — הגנה מ-XSS
    # מותאם לאתר סטטי עם Google Fonts, YouTube embeds וסקריפטים inline
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://www.google-analytics.com https://stats.g.doubleclick.net; object-src 'none'; base-uri 'self'; form-action 'self' https:;"

    # HSTS — כבר קיים ב-Cloudflare אך מחזק גם ברמת Netlify
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

    # מניעת XSS בדפדפנים ישנים
    X-XSS-Protection = "1; mode=block"
